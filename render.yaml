# Render Blueprint — POS Warkop Kayu
# Deploy inventory terlebih dahulu, lalu set INVENTORY_SERVICE_URL ke URL inventory.

databases:
  - name: pos-warkop-kayu-db
    plan: free
    databaseName: pos_warkop_kayu
    user: pos_warkop_kayu

services:
  - type: web
    name: pos-warkop-kayu
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pos-warkop-kayu-db
          property: connectionString
      - key: DB_URL
        fromDatabase:
          name: pos-warkop-kayu-db
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: Warkop Kayu POS
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: INVENTORY_SERVICE_ENABLED
        value: "true"
      - key: INVENTORY_SYNC_TTL
        value: "120"
      - key: INVENTORY_DEFAULT_PRICE
        value: "18000"
      - key: INVENTORY_ORDER_SOURCE
        value: pos-warkop-kayu
      - key: INVENTORY_ORDER_ID_PREFIX
        value: pos-warkop-kayu
      - key: INVENTORY_SERVICE_URL
        sync: false
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
