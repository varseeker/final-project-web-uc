# Render Blueprint — POS Warkop Kayu
#
# PRASYARAT: Deploy inventory-system dulu (warkop-inventory + warkop-db).
#
# SETEL MANUAL di Render Dashboard (Environment → pos-warkop-kayu):
#   APP_KEY              → php artisan key:generate --show (unik, format base64:...)
#   APP_URL              → https://pos-warkop-kayu.onrender.com
#   DATABASE_URL         → External Database URL dari PostgreSQL warkop-db (sama dengan inventory)
#   DB_URL               → sama dengan DATABASE_URL
#   INVENTORY_SERVICE_URL→ https://warkop-inventory.onrender.com
#   INVENTORY_API_TOKEN  → token rahasia (HARUS SAMA dengan warkop-inventory)
#   MIDTRANS_SERVER_KEY  → dari dashboard Midtrans
#   MIDTRANS_CLIENT_KEY  → dari dashboard Midtrans
#
# Lihat DEPLOY.md untuk checklist lengkap dan verifikasi koneksi.

services:
  - type: web
    name: pos-warkop-kayu
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: DB_PREFIX
        value: pos_
      - key: DB_MIGRATION_TABLE
        value: migrations
      - key: RENDER_REGION
        value: singapore
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: Warkop Kayu POS
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: INVENTORY_SERVICE_ENABLED
        value: "true"
      - key: INVENTORY_SYNC_TTL
        value: "120"
      - key: INVENTORY_DEFAULT_PRICE
        value: "18000"
      - key: INVENTORY_ORDER_SOURCE
        value: pos-warkop-kayu
      - key: INVENTORY_ORDER_ID_PREFIX
        value: pos-warkop-kayu
      - key: INVENTORY_TIMEOUT_SECONDS
        value: "30"
      - key: INVENTORY_SERVICE_URL
        sync: false
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: MIDTRANS_SERVER_KEY
        value: SB-Mid-server-t8MFom-L-ZMiJYA0lPvUX8hc
      - key: MIDTRANS_CLIENT_KEY
        value: SB-Mid-client-07PMj5xBlweORohB
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
